openapi: 3.0.0
info:
  title: Koa后台管理系统API
  version: 1.0.0
  description: 网站后台Koa API接口文档
servers:
  - url: http://localhost:3000
    description: 本地开发服务器
components:
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: 状态码
        message:
          type: string
          description: 响应消息
        data:
          type: object
          description: 响应数据
          nullable: true
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名
        password:
          type: string
          description: 密码
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT令牌
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
  - name: 认证授权
    description: 登录登出等认证接口
  - name: 用户管理
    description: 用户相关接口
  - name: 菜单管理
    description: 菜单相关接口
  - name: 角色管理
    description: 角色相关接口
  - name: 权限管理
    description: 权限相关接口
paths:
  /api/system/user/login:
    post:
      tags:
        - 认证授权
      summary: 用户登录
      description: 用户登录接口，成功返回JWT令牌
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
                properties:
                  data:
                    $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 请求参数错误
        "401":
          description: 用户名或密码错误
  /api/system/user/userInfo:
    get:
      tags:
        - 用户管理
      summary: 获取当前用户信息
      description: 获取当前登录用户的详细信息
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 获取成功
        "401":
          description: 未授权
  /api/system/user/addUser:
    post:
      tags:
        - 用户管理
      summary: 创建新用户
      description: 创建新的系统用户
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 创建成功
        "400":
          description: 请求参数错误
  /api/system/user/editUser:
    put:
      tags:
        - 用户管理
      summary: 编辑用户信息
      description: 更新用户信息
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 更新成功
        "400":
          description: 请求参数错误
  /api/system/user/ResetPwd:
    put:
      tags:
        - 用户管理
      summary: 重置密码
      description: 用户修改自己的密码
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 密码修改成功
        "400":
          description: 请求参数错误
  /api/system/user/deleteUser/{id}:
    delete:
      tags:
        - 用户管理
      summary: 删除用户
      description: 根据ID删除用户
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 用户ID
      responses:
        "200":
          description: 删除成功
        "404":
          description: 用户不存在
  /api/system/user/userList:
    get:
      tags:
        - 用户管理
      summary: 获取用户列表
      description: 分页查询用户列表
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: pageNum
          schema:
            type: integer
          description: 页码
        - in: query
          name: pageSize
          schema:
            type: integer
          description: 每页数量
      responses:
        "200":
          description: 查询成功
  /api/system/user/logout:
    post:
      tags:
        - 认证授权
      summary: 退出登录
      description: 用户退出登录，清除Token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 退出成功
  /api/system/user/logs:
    get:
      tags:
        - 用户管理
      summary: 获取系统日志
      description: 分页查询系统操作日志
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 查询成功
  /api/system/user/addMenu:
    post:
      tags:
        - 菜单管理
      summary: 新增菜单
      description: 创建新的菜单配置
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 创建成功
  /api/system/user/editMenu:
    put:
      tags:
        - 菜单管理
      summary: 编辑菜单
      description: 更新菜单配置
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 更新成功
  /api/system/user/deleteMenu/{id}:
    delete:
      tags:
        - 菜单管理
      summary: 删除菜单
      description: 根据ID删除菜单
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 菜单ID
      responses:
        "200":
          description: 删除成功
  /api/system/user/menuList:
    get:
      tags:
        - 菜单管理
      summary: 获取用户菜单
      description: 获取当前登录用户的菜单权限树
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 获取成功
  /api/system/user/allMenuList:
    get:
      tags:
        - 菜单管理
      summary: 获取所有菜单
      description: 分页查询所有菜单列表
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 查询成功
  /api/system/user/addRole:
    post:
      tags:
        - 角色管理
      summary: 新增角色
      description: 创建新的角色配置
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 创建成功
  /api/system/user/getRoleList:
    get:
      tags:
        - 角色管理
      summary: 查询角色列表
      description: 分页查询角色列表
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 查询成功
  /api/system/user/getRoleInfo:
    get:
      tags:
        - 角色管理
      summary: 获取角色授权信息
      description: 获取当前登录用户的角色权限信息
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 获取成功
  /api/system/user/deleteRole:
    delete:
      tags:
        - 角色管理
      summary: 删除角色
      description: 根据ID删除角色
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 删除成功
  /api/system/user/getAuthBtns:
    get:
      tags:
        - 权限管理
      summary: 查询按钮权限列表
      description: 分页查询按钮权限列表
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 查询成功
  /api/system/user/putRolePermission:
    post:
      tags:
        - 角色管理
      summary: 角色授权
      description: 为角色分配菜单、按钮和表格权限
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 授权成功
