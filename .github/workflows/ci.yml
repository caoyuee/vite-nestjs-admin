name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Enable corepack & Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install

      - name: Lint frontend (best-effort)
        run: |
          if [ -d "koajs-fronted-vite" ]; then
            cd koajs-fronted-vite || exit 0
            pnpm run lint:eslint || true
            cd -
          fi

      - name: Type-check backend
        run: |
          if [ -d "koajs_backend" ]; then
            cd koajs_backend || exit 0
            pnpm run type-check
            cd -
          fi

      - name: Build frontend
        run: |
          if [ -d "koajs-fronted-vite" ]; then
            cd koajs-fronted-vite || exit 0
            pnpm run build
            cd -
          fi

      - name: Build backend
        run: |
          if [ -d "koajs_backend" ]; then
            cd koajs_backend || exit 0
            pnpm run build
            cd -
          fi
