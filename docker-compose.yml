services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: asdzxc123.
      MYSQL_DATABASE: koajs-sql
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend_nestjs
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: asdzxc123.
      DB_NAME: koajs-sql
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 256257282931
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./fronted_vite
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
  redis_data:
