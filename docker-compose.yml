version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: asdzxc123.
      MYSQL_DATABASE: koajs-sql
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend_nestjs
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend_nestjs/.env
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./fronted_vite
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"

volumes:
  db_data:
  redis_data:
